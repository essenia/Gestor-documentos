<div class="container my-4" style="max-width: 800px;">

  <!-- Información del caso -->
  <div class="card shadow-sm mb-4 p-3">
    <div class="d-flex justify-content-between align-items-center">
      <div class="fw-semibold">
        <span class="text-muted">Cliente:</span> {{ clienteNombre }} {{ clienteApellido }}
      </div>
      <div class="fw-semibold">
        <span class="text-muted">Trámite:</span> {{ tramiteDescripcion }}
      </div>
    </div>
  </div>

  <!-- Botón Nuevo Documento -->
  <div class="mb-3 text-end">
    <button class="btn btn-primary" (click)="abrirModalNuevoDocumento()">
      <i class="fas fa-plus me-1"></i> Nuevo Documento
    </button>
  </div>

  <!-- Lista de Documentos -->
  <div *ngFor="let doc of documentos" class="card mb-3 shadow-sm">
    <div class="card-body py-2 d-flex justify-content-between align-items-center">

      <!-- Nombre del documento -->
      <div class="fw-semibold">
        <span *ngIf="doc.es_obligatorio" class="text-danger me-1">*</span>
        {{ doc.nombre || getNombreTipo(doc.tipo_documento_id) || 'Documento' }}
      </div>

      <!-- Acciones -->
      <div class="d-flex gap-2 align-items-center">
        <input type="file" hidden (change)="subirArchivo($event, doc)" #fileInput>
<!-- (click)="fileInput.click()" -->
        <i *ngIf="puedeSubir(doc)" class="fas fa-upload text-secondary cursor-pointer" title="Subir" (click)="prepararSubida(doc, fileInput)"></i>
        <i *ngIf="doc.ruta || doc.progreso! > 0" class="fas fa-eye text-secondary cursor-pointer" title="Ver" (click)="verDocumento(doc)"></i>
        <i *ngIf="doc.ruta || doc.progreso! > 0" class="fas fa-download text-secondary cursor-pointer" title="Descargar" (click)="descargarDocumento(doc)"></i>
        <!-- <i *ngIf="doc.ruta && isPendiente(doc)" class="fas fa-check-circle text-body cursor-pointer" title="Validar" (click)="validarDocumento(doc, 'completado')"></i> -->
       <!-- VALIDAR (gris) -->
<i *ngIf="doc.ruta && isPendiente(doc)" class="fas fa-check-circle text-secondary cursor-pointer" title="Validar" (click)="validarDocumento(doc, 'completado')"></i>
       <!-- VALIDADO (verde) -->
 <i *ngIf="doc.ruta && isDocumentoCompletado(doc)" class="fas fa-check-circle text-success" title="Documento validado"></i>
        <i *ngIf="doc.ruta || doc.progreso! > 0" class="fas fa-trash text-danger cursor-pointer" title="Eliminar" (click)="eliminarDocumento(doc)"></i>
      </div>

    </div>

    <!-- Estado y progreso -->
    <div class="px-3 pb-2">
      <small class="text-muted">
        {{ doc.ruta ? 'Documento subido' : (doc.progreso! > 0 ? 'Subiendo...' : 'Pendiente de subida') }}
      </small>
      <div class="progress mt-1" style="height: 5px;">
        <div class="progress-bar bg-success" [style.width]="doc.progreso! + '%'"></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Nuevo Documento (igual que antes, compacto y funcional) -->
<div class="modal fade" id="modalNuevoDocumento" tabindex="-1" aria-labelledby="modalNuevoDocumentoLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalNuevoDocumentoLabel">Nuevo Documento</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">

        <!-- Tipo de Documento -->
        <div class="mb-3">
          <label for="tipoDocumento" class="form-label">Tipo de Documento</label>
          <select id="tipoDocumento" class="form-select" [(ngModel)]="nuevoDoc.tipo_documento_id" (change)="onTipoDocumentoChange()">
            <option [ngValue]="null">-- Selecciona un tipo --</option>
            <option *ngFor="let tipo of tiposDocumento" [ngValue]="tipo.id">{{ tipo.nombre }}</option>
          </select>
        </div>

        <!-- Botón Añadir campos extra -->
        <div class="mb-3 text-end" *ngIf="!mostrarCamposExtra">
          <button type="button" class="btn btn-sm btn-success" (click)="mostrarCamposExtra = true">
            <i class="fas fa-plus me-1"></i> Añadir detalles
          </button>
        </div>

        <!-- Campos extra -->
        <div *ngIf="mostrarCamposExtra">
          <div class="mb-2">
            <label for="nuevoTipoDocumento" class="form-label">O ingresa un tipo nuevo</label>
            <input id="nuevoTipoDocumento" type="text" class="form-control" [(ngModel)]="nuevoDoc.nuevo_tipo_nombre" placeholder="Nombre nuevo">
          </div>

          <div class="mb-2">
            <label for="nombreDocumento" class="form-label">Nombre del Documento</label>
            <input id="nombreDocumento" type="text" class="form-control" [(ngModel)]="nuevoDoc.nombre" placeholder="Escribe el nombre">
          </div>

          <div class="mb-2">
            <label for="comentariosDocumento" class="form-label">Comentarios</label>
            <textarea id="comentariosDocumento" class="form-control" [(ngModel)]="nuevoDoc.comentarios" rows="2" placeholder="Opcional"></textarea>
          </div>

          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="obligatorioDocumento" [(ngModel)]="nuevoDoc.es_obligatorio">
            <label class="form-check-label" for="obligatorioDocumento">Documento Obligatorio</label>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" (click)="agregarDocumento(); cerrarModalNuevoDocumento()">Crear Documento</button>
      </div>

    </div>
  </div>
</div>

<style>
  .cursor-pointer { cursor: pointer; }
  .document-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    transition: 0.3s;
  }
  .card-body p {
    margin-bottom: 0.2rem;
    font-size: 0.95rem;
  }
  .progress {
    border-radius: 3px;
  }
</style>
